AWSTemplateFormatVersion: '2010-09-09'

Resources:
  # IAM Role for EC2
  EC2S3Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EC2-S3-Access-Role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess

  # Instance Profile
  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref EC2S3Role

  # VPC Endpoint for S3
  S3VPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: com.amazonaws.us-east-1.s3
      VpcId: !ImportValue VPCs-VPC2Id
      RouteTableIds:
        - !ImportValue VPCs-PrivateRouteTable2Id
      VpcEndpointType: Gateway

  # EC2 Instance
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64:1}}'
      InstanceType: t2.micro
      SubnetId: !ImportValue VPCs-PrivateSubnet2AId
      SecurityGroupIds:
        - !ImportValue VPCs-SecurityGroup2Id
      IamInstanceProfile: !Ref EC2InstanceProfile
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          aws s3 mb s3://bold-ilya-test
          echo "Hello, World!" > hello.txt
          aws s3 cp hello.txt s3://bold-ilya-test/
